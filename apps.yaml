# Consumer → compose-profile index. Drives the `depot` launcher menu (the compose PROFILES are the real
# source of truth; this just gives friendly names + the service list to display). Add a new consumer or
# service by editing the compose profiles + this file.

apps:
  stage-2-research:
    profile: stage-2
    services: [langfuse]          # + searxng once Phase 4 migrates it here
    description: "ai-engineer-research (Stage 2 deep researcher)"
  stage-3-poc:
    profile: stage-3
    services: [langfuse]
    description: "Stage 3 PoC builder (future consumer)"

# Service-level profiles for the launcher's "custom" path (pick individual services).
services:
  langfuse:
    profile: langfuse
    description: "LLM observability (web UI on :3000)"
