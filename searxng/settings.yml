# Minimal SearXNG settings for programmatic use (the JSON search API consumers use).
# Merges over the image defaults via use_default_settings.
use_default_settings: true

server:
  # CHANGE THIS to a long random string on the server (kept out of git history if you like).
  secret_key: "change-me-to-a-32char-plus-random-secret"
  limiter: false            # disable rate limiter for local programmatic queries
  image_proxy: false

search:
  # JSON is required for programmatic querying by the search tool.
  formats:
    - html
    - json
